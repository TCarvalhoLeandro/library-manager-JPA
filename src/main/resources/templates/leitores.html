<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Leitores</title>
	<style>
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			margin: 40px;
			/* Mesma imagem de fundo para consistência */
			background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=1920&auto=format&fit=crop');
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-color: #cccccc;
		}

		h1 {
			color: white;
			text-shadow: 2px 2px 4px #000000;
			text-align: center;
			margin-bottom: 30px;
		}

		/* --- TABELA --- */
		table {
			width: 90%;
			margin: 0 auto;
			/* Centraliza a tabela na tela */
			border-collapse: collapse;

			/* Fundo BRANCO com 90% de opacidade (0.9) */
			/* Isso permite ver um pouquinho da imagem de fundo atrás da tabela */
			background-color: rgba(255, 255, 255, 0.95);

			border-radius: 10px;
			/* Bordas arredondadas na tabela */

			overflow: hidden;
			/* Garante que a borda redonda corte as pontas */

			box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			/* Sombra atrás da tabela para dar destaque 3D */
		}

		th,
		td {
			padding: 15px;
			text-align: left;
			border-bottom: 1px solid #ddd;
		}

		/* --- DIFERENÇA: Cabeçalho Laranja para Autores --- */
		th {
			background-color: #3498db;
			/* Azul */
			color: white;
			font-size: 1.1rem;
		}

		tr:hover {
			background-color: #f1f1f1;
		}

		/* Container que segura todos os botões */
		.menu-container {
			display: flex;
			justify-content: space-between;
			/* <--- MUDAR PARA 'space-between' */
			align-items: center;
			/* Garante que fiquem alinhados verticalmente */
			margin-bottom: 20px;
		}

		/* Estilo de cada botão individual */
		.btn-menu {
			background-color: white;
			color: #2c3e50;
			/* Cor do texto (cinza escuro elegante) */
			padding: 15px 30px;
			/* Tamanho do botão (altura x largura interna) */
			text-decoration: none;
			/* Tira o sublinhado do link */
			font-weight: bold;
			font-size: 1.1rem;
			border-radius: 12px;
			/* Bordas arredondadas modernas */

			/* Sombra suave para dar efeito 3D */
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

			/* Transição suave para animação */
			transition: all 0.3s ease;

			/* Garante que todos tenham pelo menos esse tamanho */
			min-width: 160px;
			text-align: center;
			border: 2px solid transparent;
			/* Prepara para a borda no hover */
		}

		/* Efeito quando passa o mouse em cima */
		.btn-menu:hover {
			transform: translateY(-5px);
			/* O botão "flutua" pra cima */
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
			/* Sombra aumenta */
			background-color: #3498db;
			/* Fica azul */
			color: white;
			/* Texto vira branco */
		}

		/* Efeito de clique (opcional) */
		.btn-menu:active {
			transform: translateY(-2px);
			box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
		}

		.btn-excluir {
			background-color: #e74c3c;
			/* Vermelho */
			color: white;
			padding: 5px 10px;
			text-decoration: none;
			border-radius: 5px;
			font-size: 0.9rem;
			margin-left: 5px;
			transition: 0.3s;
		}

		.btn-excluir:hover {
			background-color: #c0392b;
			/* Vermelho mais escuro */
		}
		/* Classe específica para a coluna de botões */
		.col-acoes {
		    text-align: right;   /* Joga tudo para a direita */
		    white-space: nowrap; /* Impede que um botão caia para a linha de baixo */
		    min-width: 180px;    /* Garante um espaço mínimo para não espremer os botões */
		    padding-right: 20px; /* Um respiro para não colar na borda da tela */
		}
		
		/* Estilo para mensagens de alerta */
		.alert {
		    padding: 15px;
		    margin-bottom: 20px;
		    border: 1px solid transparent;
		    border-radius: 4px;
		    font-weight: bold;
		    text-align: center;
		}

		/* Cor para ERRO (Vermelho) */
		.alert-danger {
		    color: #a94442;
		    background-color: #f2dede;
		    border-color: #ebccd1;
		}

		/* Cor para SUCESSO (Verde) */
		.alert-success {
		    color: #3c763d;
		    background-color: #dff0d8;
		    border-color: #d6e9c6;
		}
	</style>
</head>

<body>

	<div class="menu-container">
		<a href="/" class="btn-menu">Home</a>
		<a th:href="@{/biblioteca/leitores/novo}" class="btn-menu">Novo</a>

	</div>




	<h1>👨🏽‍🏫 Leitores Cadastrados</h1>
	
	<div th:if="${mensagemErro}" class="alert alert-danger">
	    <span th:text="${mensagemErro}"></span>
	</div>

	<div th:if="${mensagemSucesso}" class="alert alert-success">
	    <span th:text="${mensagemSucesso}"></span>
	</div>
	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Nome</th>
				<th>Telefone</th>
				<th>Endereço</th>
				<th class="col-acoes">Ações</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="leitor : ${meusLeitores}">
				<td th:text="${leitor.id}">1</td>
				<td th:text="${leitor.nome}">nome</td>
				<td th:text="${leitor.telefone}">(xx xxxxx-xxxx)</td>
				<td th:text="${leitor.endereco}">Rua dos Elfos</td>
				<td class="col-acoes">
					<a th:href="@{/biblioteca/leitores/editar/{id}(id=${leitor.id})}" class="btn-editar">Editar</a>
					<a th:href="@{/biblioteca/leitores/deletar/{id}(id=${leitor.id})}" class="btn-excluir"
						onclick="return confirm('Tem certeza que deseja excluir este leitor? Esta ação não pode ser desfeita.')">
						Excluir
					</a>
				</td>
			</tr>
		</tbody>
	</table>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Livros</title>
	<style>
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			margin: 40px;
			background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=1920&auto=format&fit=crop');
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-color: #cccccc;
		}

		h1 {
			color: white;
			text-shadow: 2px 2px 4px #000000;
			text-align: center;
			margin-bottom: 30px;
		}

		/* --- TABELA --- */
		table {
			width: 100%;
			margin: 0 auto;
			border-collapse: collapse;
			background-color: rgba(255, 255, 255, 0.95);
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			
		}

		th,
		td {
			padding: 15px;
			text-align: left;
			border-bottom: 1px solid #ddd;
		}

		
		th {
			background-color: #4CAF50;
			color: white;
			font-size: 1.1rem;
		}

		tr:hover {
			background-color: #f1f1f1;
		}

		.disponivel {
			color: #27ae60;
			font-weight: bold;
			background-color: #eafaf1;
			padding: 5px 10px;
			border-radius: 15px;
		}

		.indisponivel {
			color: #c0392b;
			font-weight: bold;
			background-color: #fdedec;
			padding: 5px 10px;
			border-radius: 15px;
		}

		/* Container que segura todos os botões */
		.menu-container {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
		}


		/* Estilo de cada botão individual */
		.btn-menu {
			background-color: white;
			color: #2c3e50;
			padding: 15px 30px;
			text-decoration: none;
			font-weight: bold;
			font-size: 1.1rem;
			border-radius: 12px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			transition: all 0.3s ease;
			min-width: 160px;
			text-align: center;
			border: 2px solid transparent;
		
		}

		/* Efeito quando passa o mouse em cima */
		.btn-menu:hover {
			transform: translateY(-5px);
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
			background-color: #3498db;
			color: white;
		}

		/* Classe específica para a coluna de botões */
		.col-acoes {
			text-align: right;
			white-space: nowrap;
			min-width: 180px;
			padding-right: 20px;
		}

		/* Efeito de clique (opcional) */
		.btn-menu:active {
			transform: translateY(-2px);
			box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
		}


		.btn-excluir,
		.btn-editar {
			color: white;
			padding: 5px 10px;
			text-decoration: none;
			border-radius: 5px;
			font-size: 0.9rem;
			margin-left: 5px;
			transition: 0.3s;
		}

		.btn-excluir {
			background-color: #e74c3c;
		}

		.btn-excluir:hover {
			background-color: #c0392b;
			transform: translateY(-2px);
		}

		.btn-editar {
			background-color: #545fe8;
		}

		.btn-editar:hover {
			background-color: #404ded;
			transform: translateY(-2px);
		}
	</style>
</head>

<body>


	<div class="menu-container">
		<a href="/" class="btn-menu">Home</a>
		<a th:href="@{/biblioteca/livros/novo}" class="btn-menu">Novo</a>

	</div>

	<h1>📚 Livros Cadastrados</h1>

	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Título</th>
				<th>ISBN</th>
				<th>Autor</th>
				<th>Status</th>
				<th class="col-acoes">Ações</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="livro : ${meusLivros}">
				<td th:text="${livro.id}">1</td>
				<td th:text="${livro.titulo}">Titulo</td>
				<td th:text="${livro.isbn}">xxx-xxxxxx</td>
				<td th:text="${livro.autor.nome}">Nome do Autor</td>
				<td>
					<span th:text="${livro.disponivel} ? 'Disponível' : 'Indisponível'"
						th:class="${livro.disponivel} ? 'disponivel' : 'indisponivel'">
					</span>
				</td>
				<td class="col-acoes">
					<a th:href="@{/biblioteca/livros/editar/{id}(id=${livro.id})}" class="btn-editar">Editar</a>

					<a th:href="@{/biblioteca/livros/deletar/{id}(id=${livro.id})}" class="btn-excluir"
						onclick="return confirm('Tem certeza que deseja excluir este livro?')">Excluir</a>
				</td>
			</tr>
		</tbody>
	</table>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Controle de Empréstimos</title>
    <style>
        /* --- ESTILO GERAL --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #cccccc;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px #000000;
            text-align: center;
            margin-bottom: 30px;
        }

        /* --- TABELA --- */
        table {
            width: 100%; /* Tabela mais larga pois tem muitas colunas */
            margin: 0 auto;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.95); 
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        /* --- DIFERENÇA: Cabeçalho ROXO para Empréstimos --- */
        th {
            background-color: #8e44ad; /* Roxo */
            color: white;
            font-size: 1.1rem;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* Etiquetas de Status */
        .badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .aberto {
            background-color: #f1c40f; /* Amarelo */
            color: #7f8c8d;
        }
        .devolvido {
            background-color: #2ecc71; /* Verde */
            color: white;
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <a href="/" class="btn-voltar">Home</a>

    <h1>📅 Histórico de Empréstimos</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Leitor</th>
                <th>Livro</th>
                <th>Data Empréstimo</th>
                <th>Previsão Entrega</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${meusEmprestimos}">
                <td th:text="${emp.id}">1</td>
                
                <td th:text="${emp.leitor.nome}">Nome do Leitor</td>
                <td th:text="${emp.livro.titulo}">Nome do Livro</td>
                
                <td th:text="${#temporals.format(emp.dataEmprestimo, 'dd/MM/yyyy')}">01/01/2026</td>
                <td th:text="${#temporals.format(emp.dataPrevisaoEntrega, 'dd/MM/yyyy')}">08/01/2026</td>
                
                <td>
                    <span th:if="${emp.dataEntrega == null}" class="badge aberto">Pendente</span>
                    
                    <span th:unless="${emp.dataEntrega == null}" class="badge devolvido">
                        Devolvido em <span th:text="${#temporals.format(emp.dataEntrega, 'dd/MM')}"></span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>

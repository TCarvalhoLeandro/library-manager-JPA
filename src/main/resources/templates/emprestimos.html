<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Controle de Empréstimos</title>
	<style>
		/* --- ESTILO GERAL --- */
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			margin: 40px;
			background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=1920&auto=format&fit=crop');
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			background-color: #cccccc;
		}

		h1 {
			color: white;
			text-shadow: 2px 2px 4px #000000;
			text-align: center;
			margin-bottom: 30px;
		}

		/* --- TABELA --- */
		table {
			width: 100%;
			/* Tabela mais larga pois tem muitas colunas */
			margin: 0 auto;
			border-collapse: collapse;
			background-color: rgba(255, 255, 255, 0.95);
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
		}

		th,
		td {
			padding: 15px;
			text-align: left;
			border-bottom: 1px solid #ddd;
		}

		/* --- DIFERENÇA: Cabeçalho ROXO para Empréstimos --- */
		th {
			background-color: #8e44ad;
			/* Roxo */
			color: white;
			font-size: 1.1rem;
		}

		tr:hover {
			background-color: #f1f1f1;
		}

		/* Etiquetas de Status */
		.badge {
			padding: 5px 10px;
			border-radius: 12px;
			font-size: 0.9rem;
			font-weight: bold;
			text-transform: uppercase;
		}

		.aberto {
			background-color: #f1c40f;
			/* Amarelo */
			color: #7f8c8d;
		}

		.devolvido {
			background-color: #2ecc71;
			/* Verde */
			color: white;
		}

		/* Container que segura todos os botões */
		.menu-container {
			display: flex;
			justify-content: space-between;
			/* <--- MUDAR PARA 'space-between' */
			align-items: center;
			/* Garante que fiquem alinhados verticalmente */
			margin-bottom: 20px;
		}

		/* Estilo de cada botão individual */
		.btn-menu {
			background-color: white;
			color: #2c3e50;
			/* Cor do texto (cinza escuro elegante) */
			padding: 15px 30px;
			/* Tamanho do botão (altura x largura interna) */
			text-decoration: none;
			/* Tira o sublinhado do link */
			font-weight: bold;
			font-size: 1.1rem;
			border-radius: 12px;
			/* Bordas arredondadas modernas */

			/* Sombra suave para dar efeito 3D */
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

			/* Transição suave para animação */
			transition: all 0.3s ease;

			/* Garante que todos tenham pelo menos esse tamanho */
			min-width: 160px;
			text-align: center;
			border: 2px solid transparent;
			/* Prepara para a borda no hover */
		}

		/* Efeito quando passa o mouse em cima */
		.btn-menu:hover {
			transform: translateY(-5px);
			/* O botão "flutua" pra cima */
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
			/* Sombra aumenta */
			background-color: #3498db;
			/* Fica azul */
			color: white;
			/* Texto vira branco */
		}

		/* Classe específica para a coluna de botões */
		.col-acoes {
			text-align: right;
			/* Joga tudo para a direita */
			white-space: nowrap;
			/* Impede que um botão caia para a linha de baixo */
			min-width: 180px;
			/* Garante um espaço mínimo para não espremer os botões */
			padding-right: 20px;
			/* Um respiro para não colar na borda da tela */
		}
	</style>
</head>

<body>

	<div class="menu-container">
		<a href="/" class="btn-menu">Home</a>
		<a th:href="@{/biblioteca/emprestimos/novo}" class="btn-menu">Novo</a>

	</div>

	<h1>📅 Histórico de Empréstimos</h1>

	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>Leitor</th>
				<th>Livro</th>
				<th>Data Empréstimo</th>
				<th>Previsão Entrega</th>
				<th>Status</th>
				<th class="col-acoes">Ações</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="emp : ${meusEmprestimos}">
				<td th:text="${emp.id}">1</td>

				<td th:text="${emp.leitor.nome}">Nome do Leitor</td>
				<td th:text="${emp.livro.titulo}">Nome do Livro</td>

				<td th:text="${#temporals.format(emp.dataEmprestimo, 'dd/MM/yyyy')}">01/01/2026</td>
				<td th:text="${#temporals.format(emp.dataPrevisaoEntrega, 'dd/MM/yyyy')}">08/01/2026</td>

				<td>
					<span th:if="${emp.dataEntrega == null}" class="badge aberto">Pendente</span>

					<span th:unless="${emp.dataEntrega == null}" class="badge devolvido">
						Devolvido em <span th:text="${#temporals.format(emp.dataEntrega, 'dd/MM')}"></span>
					</span>
				</td>
			</tr>
		</tbody>
	</table>

</body>

</html>
